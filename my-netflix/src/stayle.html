<!DOCTYPE html>
<html>
<head>
    <title>Trailer Test</title>
    <style>
        .movie-container { display: flex; gap: 15px; padding: 20px; }
        .movie-poster { width: 150px; cursor: pointer; border-radius: 8px; border: 2px solid #ddd; }
        
    
        .modal { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.8); 
            justify-content: center; align-items: center; z-index: 999;
        }
        .modal-content { position: relative; width: 80%; max-width: 700px; }
        .close-btn { position: absolute; top: -35px; right: 0; color: #fff; font-size: 30px; cursor: pointer; }
        iframe { width: 100%; height: 400px; }
    </style>
</head>
<body>

    <div class="movie-container">
        <img src="https://via.placeholder.com/150x220" class="movie-poster" data-trailer="https://www.youtube.com/embed/dQw4w9WgXcQ">
        <img src="https://via.placeholder.com/150x220" class="movie-poster" data-trailer="https://www.youtube.com/embed/tgbNymZ7vqY">
    </div>

    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeVideo()">&times;</span>
            <iframe id="trailer-video" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const modal = document.getElementById('video-modal');
        const trailerFrame = document.getElementById('trailer-video');
        const posters = document.querySelectorAll('.movie-poster');

        posters.forEach(poster => {
            poster.onclick = function() {
                const url = this.getAttribute('data-trailer');
                trailerFrame.src = url;
                modal.style.display = 'flex';
            };
        });

        function closeVideo() {
            modal.style.display = 'none';
            trailerFrame.src = ""; // ቪዲዮውን ያቆመዋል
        }

        window.onclick = function(event) {
            if (event.target == modal) { closeVideo(); }
        }
    </script>

</body>
</html>
